services:
  - type: web
    name: cow-x
    runtime: python
    buildCommand: uv sync --frozen --no-dev
    preDeployCommand: uv run alembic upgrade head
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.15
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cow-x-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.5
      - key: OPENAI_TIMEOUT_SECONDS
        value: "30"
      - key: OPENAI_MAX_RETRIES
        value: "2"
      - key: SARVAM_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: openai
      - key: STT_PROVIDER
        value: sarvam
      - key: TTS_PROVIDER
        value: sarvam
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TWILIO_VERIFY_SERVICE_SID
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: TWIML_MESSAGE
        sync: false
      - key: TWILIO_VALIDATE_REQUESTS
        sync: false
      - key: DB_URL
        fromDatabase:
          name: cow-x-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false

databases:
  - name: cow-x-db
    databaseName: cow_x
